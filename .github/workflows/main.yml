name: GSheets Exact PNG Relay

on:
  workflow_dispatch: 

jobs:
  relay_gsheets:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the correct Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install the required Python libraries (including Pillow for cropping)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install slack_sdk playwright Pillow
          
      # 4. Install the invisible Chrome browser that takes the picture
      - name: Install Headless Browser
        run: playwright install chromium 

      # 5. Run the camera script using the hidden GitHub Secrets
      - name: Run GSheets Camera Script
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          GROWTH_CHANNEL_ID: ${{ secrets.GROWTH_CHANNEL_ID }}
        run: python gsheet_camera.py
